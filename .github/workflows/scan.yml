name: daily-breakout-scan

on:
  schedule:
    # 21:30 UTC = ~00:30 KSA, safely after the US close (16:00 ET).
    # India (NSE) closed hours earlier the same day, so one run covers both.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:   # also lets you trigger it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install backtesting yfinance pandas numpy
      - run: python daily_scan.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
